<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Headphones Product Grid</title>
    <style>
        .card-img-top {
            max-width: 300px;
            width: 100%;
            max-height: 300px;
            height: 100%;
            object-fit: contain; /* Prevents product images from stretching distortively */
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <div class="container my-5">
        <div class="row g-4">
            
            <div class="col-12 col-md-6 col-lg-4 d-flex justify-content-center">
                <div class="card h-100" style="width: 18rem;">
                    <img src="shopping (10).webp" class="card-img-top" alt="JBL Tune 520BT">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">JBL Tune 520BT Wireless On Ear Headphones</h5>
                        <div class="mt-auto">
                            <h4 class="card-text mb-1"><i class="fa-solid fa-indian-rupee-sign"></i>2,490</h4> 
                            <span style="color: green;"><b>25% Off</b></span>
                            <div class="d-flex gap-2 mt-3">
                                <a href="#" class="btn btn-outline-info w-100">Add to Cart</a>
                                <a href="#" class="btn btn-success w-100">Buy Now</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-4 d-flex justify-content-center">
                <div class="card h-100" style="width: 18rem;">
                    <img src="shopping (9).webp" class="card-img-top" alt="Sony WH-CH520">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">Sony WH-CH520 Wireless Bluetooth Headphones</h5>
                        <div class="mt-auto">
                            <h4 class="card-text mb-1"><i class="fa-solid fa-indian-rupee-sign"></i>4,490</h4> 
                            <span style="color: green;"><b>25% Off</b></span>
                            <div class="d-flex gap-2 mt-3">
                                <a href="#" class="btn btn-outline-info w-100">Add to Cart</a>
                                <a href="#" class="btn btn-success w-100">Buy Now</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-4 d-flex justify-content-center">
                <div class="card h-100" style="width: 18rem;">
                    <img src="shopping (8).webp" class="card-img-top" alt="Noise Two Wireless">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">Noise Two Wireless Headphones</h5>
                        <div class="mt-auto">
                            <h4 class="card-text mb-1"><i class="fa-solid fa-indian-rupee-sign"></i>1,699</h4> 
                            <span style="color: green;"><b>25% Off</b></span>
                            <div class="d-flex gap-2 mt-3">
                                <a href="#" class="btn btn-outline-info w-100">Add to Cart</a>
                                <a href="#" class="btn btn-success w-100">Buy Now</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
